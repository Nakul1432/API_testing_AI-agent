{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | API Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Custom CSS for a professional AI-themed look */
        body {
            /* Animated gradient background */
            background: radial-gradient(circle at top right, #1a1a1a, #000000);
            overflow: hidden;
        }

        /* Ambient glow effect in the background */
        .glow-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Glassmorphism for the login card */
        .login-card {
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle hover pulse for the robot icon */
        .robot-icon {
            transition: all 0.3s ease;
        }
        .login-card:hover .robot-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Custom focus ring for the button */
        .google-btn:focus {
            outline: 2px solid white;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-black h-screen flex items-center justify-center relative">
    
    <div class="glow-bg"></div>

    <div class="login-card bg-zinc-900/80 border border-zinc-800 p-8 rounded-3xl shadow-2xl w-96 text-center relative z-10">
        <div class="robot-icon bg-zinc-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i class="fas fa-robot text-3xl text-black"></i>
        </div>

        <h2 class="text-white text-2xl font-bold mb-2 tracking-tight">Welcome Back</h2>
        <p class="text-zinc-500 text-sm mb-8">Access your API Agent Suite</p>

        <a href="{% provider_login_url 'google' %}" 
           class="google-btn flex items-center justify-center w-full bg-white hover:bg-zinc-200 text-black font-bold py-3.5 px-4 rounded-xl transition-all duration-300 transform active:scale-95 shadow-xl">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3">
            Continue with Google
        </a>

        <div class="mt-8 pt-6 border-t border-zinc-800">
            <p class="text-[10px] text-zinc-600 uppercase tracking-widest font-bold">Secure Authentication</p>
        </div>
    </div>

</body>
</html>
